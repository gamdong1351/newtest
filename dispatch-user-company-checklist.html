<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용업체 사업장 위반사항 체크리스트</title>
  <style>
    :root {
      --bg1: #f8fbff;
      --bg2: #edf5ff;
      --panel: #ffffff;
      --line: #d9e3f0;
      --text: #1f2937;
      --sub: #5f6b7a;
      --primary: #0a56d6;
      --primary2: #2b86ff;
      --high: #b91c1c;
      --high-bg: #fee2e2;
      --med: #92400e;
      --med-bg: #fef3c7;
      --low: #166534;
      --low-bg: #dcfce7;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      padding: 20px;
    }

    .back-wrap { width: min(1200px, 100%); margin: 0 auto 10px; }
    .back-btn {
      display: inline-block; text-decoration: none; font-size: 0.9rem; font-weight: 700;
      color: #0a4fc4; background: #eef4ff; border: 1px solid #cfe0ff; border-radius: 999px; padding: 7px 12px;
    }

    .wrap {
      width: min(1200px, 100%); margin: 0 auto; border: 1px solid #e5ecf8; border-radius: 16px;
      background: #fff; overflow: hidden; box-shadow: 0 12px 28px rgba(2, 6, 23, 0.08);
    }

    .head { padding: 22px; color: #fff; background: linear-gradient(120deg, var(--primary), var(--primary2)); }
    .head h1 { margin: 0 0 8px; font-size: 1.45rem; }
    .head p { margin: 0; font-size: 0.92rem; line-height: 1.5; opacity: 0.96; }

    .content { padding: 16px; display: grid; gap: 12px; }

    .toolbar {
      border: 1px solid #e8edf5; border-radius: 12px; background: #fff; padding: 12px;
      display: grid; gap: 10px; grid-template-columns: 1fr auto auto; align-items: center;
    }

    .info { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-block; border: 1px solid #d3deed; border-radius: 999px;
      padding: 5px 10px; font-size: 0.82rem; font-weight: 700; background: #f6f9ff; color: #375176;
    }

    .btn { border: none; border-radius: 10px; padding: 8px 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn.soft { background: #eef4ff; color: #2c4770; border: 1px solid #c7d8fb; }

    .table-wrap { border: 1px solid #e6edf7; border-radius: 12px; overflow: auto; background: #fff; }
    table { width: 100%; min-width: 1120px; border-collapse: collapse; font-size: 0.9rem; }
    th, td { border-bottom: 1px solid #edf2f8; padding: 9px 8px; text-align: left; vertical-align: top; }
    th { position: sticky; top: 0; background: #f8fbff; z-index: 1; font-size: 0.82rem; color: #3f5170; }

    .risk {
      display: inline-block; border-radius: 999px; padding: 3px 8px; font-size: 0.78rem; font-weight: 700; border: 1px solid transparent;
    }
    .risk.high { color: var(--high); background: var(--high-bg); border-color: #fecaca; }
    .risk.medium { color: var(--med); background: var(--med-bg); border-color: #fde68a; }
    .risk.low { color: var(--low); background: var(--low-bg); border-color: #bbf7d0; }

    select, input[type="text"] {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px;
      font-size: 0.86rem; font-family: inherit; background: #fff;
    }

    .small { color: var(--sub); font-size: 0.8rem; line-height: 1.45; }

    @media (max-width: 920px) { .toolbar { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="back-wrap">
    <a class="back-btn" href="index.html">메인으로 돌아가기</a>
  </div>

  <main class="wrap">
    <section class="head">
      <h1>사용업체 사업장 위반사항 체크리스트</h1>
      <p>사용사업주 관점에서 직접고용의무, 지휘명령, 차별금지, 안전보건, 임금·근로시간 연계 리스크를 점검합니다.</p>
    </section>

    <section class="content">
      <div class="toolbar">
        <div class="info">
          <span class="badge" id="doneCount">완료 0</span>
          <span class="badge" id="todoCount">미조치 0</span>
          <span class="badge" id="highOpenCount">고위험 미조치 0</span>
        </div>
        <button class="btn soft" id="resetBtn" type="button">체크 초기화</button>
        <button class="btn primary" id="printBtn" type="button">인쇄</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:50px;">No</th>
              <th style="width:250px;">점검 항목</th>
              <th style="width:90px;">위험도</th>
              <th style="width:180px;">주요 위반 포인트</th>
              <th style="width:120px;">법령 근거</th>
              <th style="width:170px;">벌칙·과태료 조항</th>
              <th style="width:190px;">확인 증빙</th>
              <th style="width:120px;">점검 상태</th>
              <th style="width:180px;">조치 메모</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <p class="small">
        참고 근거: 파견근로자보호 등에 관한 법률 제5조, 제6조, 제6조의2, 차별적 처우 금지 규정, 근로기준법 및 산업안전보건법 관련 조항.<br>
        최종 판단은 최신 법령 원문, 행정해석, 판례와 함께 노무·법무 검토를 병행하세요.
      </p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "dispatch_user_company_checklist_v1";

    const rows = [
      { title: "불법파견·위장도급 여부", risk: "high", point: "도급계약 명목이나 실질 지휘명령", law: "파견법·판례", penalty: "파견법 제43조·제46조", evidence: "업무지시체계, 출퇴근통제" },
      { title: "파견대상·금지업무 준수", risk: "high", point: "허용업무 외/금지업무 사용", law: "파견법 제5조", penalty: "파견법 제43조·제46조", evidence: "직무기술서, 공정표" },
      { title: "동일근로자 파견기간 2년 초과", risk: "high", point: "기간관리 실패로 직접고용의무 발생", law: "파견법 제6조", penalty: "파견법 제43조·제46조", evidence: "투입이력, 근무표" },
      { title: "직접고용의무 이행", risk: "high", point: "의무 발생 후 고용 미이행", law: "파견법 제6조의2", penalty: "파견법 제46조", evidence: "고용통지, 계약서" },
      { title: "파견근로자 차별금지", risk: "high", point: "동종업무 대비 임금·복리후생 차별", law: "파견법 차별금지", penalty: "파견법 제46조", evidence: "임금비교표, 규정" },
      { title: "연장·야간·휴일근로 운영", risk: "high", point: "실근로시간 관리 미흡, 가산수당 누락", law: "근로기준법 제56조", penalty: "근기법 제109조", evidence: "근태기록, 급여명세" },
      { title: "휴게·휴일 부여", risk: "medium", point: "휴게시간 미부여·형식운영", law: "근로기준법 제54조", penalty: "근기법 제110조", evidence: "근무표, 현장기록" },
      { title: "산업안전보건 책임 이행", risk: "high", point: "위험성평가/교육/보호구 미흡", law: "산안법", penalty: "산안법 제167조~제175조", evidence: "교육일지, 점검표" },
      { title: "성희롱·괴롭힘 대응 체계", risk: "medium", point: "신고접수·조사·보호조치 미흡", law: "근기법·남녀고용법", penalty: "근기법·남녀고용법 제재", evidence: "규정, 조사문서" },
      { title: "파견근로자 개인정보 관리", risk: "medium", point: "명부·서류 과다수집/보안 미흡", law: "개인정보보호법", penalty: "개인정보보호법 벌칙·과태료", evidence: "접근권한, 보관정책" },
      { title: "원·하청(파견사) 책임분담 명확화", risk: "medium", point: "계약상 책임·연락체계 불명확", law: "파견계약 관련", penalty: "파견법 제46조(연계위반)", evidence: "계약서, 협의록" },
      { title: "사용사업주 교육·관리자 인식", risk: "low", point: "불법파견 리스크 교육 미실시", law: "내부통제", penalty: "직접 벌칙 없음(내부통제)", evidence: "교육자료, 참석부" }
    ];

    const bodyEl = document.getElementById("body");
    const doneCountEl = document.getElementById("doneCount");
    const todoCountEl = document.getElementById("todoCount");
    const highOpenCountEl = document.getElementById("highOpenCount");

    const state = loadState();

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return {
          status: Array.isArray(parsed.status) ? parsed.status : Array(rows.length).fill("미조치"),
          memo: Array.isArray(parsed.memo) ? parsed.memo : Array(rows.length).fill("")
        };
      } catch {
        return { status: Array(rows.length).fill("미조치"), memo: Array(rows.length).fill("") };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function riskClass(risk) {
      if (risk === "high") return "high";
      if (risk === "medium") return "medium";
      return "low";
    }

    function riskText(risk) {
      if (risk === "high") return "고";
      if (risk === "medium") return "중";
      return "저";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function render() {
      bodyEl.innerHTML = rows.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${r.title}</td>
          <td><span class="risk ${riskClass(r.risk)}">${riskText(r.risk)}</span></td>
          <td>${r.point}</td>
          <td>${r.law}</td>
          <td>${r.penalty}</td>
          <td>${r.evidence}</td>
          <td>
            <select data-i="${i}" class="status">
              <option value="미조치" ${state.status[i] === "미조치" ? "selected" : ""}>미조치</option>
              <option value="점검중" ${state.status[i] === "점검중" ? "selected" : ""}>점검중</option>
              <option value="조치완료" ${state.status[i] === "조치완료" ? "selected" : ""}>조치완료</option>
            </select>
          </td>
          <td><input type="text" data-i="${i}" class="memo" value="${escapeHtml(state.memo[i] || "")}" placeholder="조치내용/기한/담당자" /></td>
        </tr>
      `).join("");

      bindEvents();
      refreshSummary();
    }

    function bindEvents() {
      bodyEl.querySelectorAll(".status").forEach((el) => {
        el.addEventListener("change", (e) => {
          const i = Number(e.target.dataset.i);
          state.status[i] = e.target.value;
          saveState();
          refreshSummary();
        });
      });

      bodyEl.querySelectorAll(".memo").forEach((el) => {
        el.addEventListener("input", (e) => {
          const i = Number(e.target.dataset.i);
          state.memo[i] = e.target.value;
          saveState();
        });
      });
    }

    function refreshSummary() {
      const done = state.status.filter((s) => s === "조치완료").length;
      const todo = state.status.filter((s) => s !== "조치완료").length;
      let highOpen = 0;
      rows.forEach((r, i) => {
        if (r.risk === "high" && state.status[i] !== "조치완료") highOpen += 1;
      });

      doneCountEl.textContent = `완료 ${done}`;
      todoCountEl.textContent = `미조치 ${todo}`;
      highOpenCountEl.textContent = `고위험 미조치 ${highOpen}`;
    }

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("체크리스트 상태와 메모를 초기화할까요?")) return;
      state.status = Array(rows.length).fill("미조치");
      state.memo = Array(rows.length).fill("");
      saveState();
      render();
    });

    document.getElementById("printBtn").addEventListener("click", () => window.print());

    render();
  </script>
</body>
</html>
