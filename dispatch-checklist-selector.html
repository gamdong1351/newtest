<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파견·사용업체 체크리스트 선택</title>
  <style>
    :root {
      --bg1: #f7fbff;
      --bg2: #eaf3ff;
      --panel: #ffffff;
      --line: #d7e1ef;
      --text: #1f2937;
      --sub: #5f6b7a;
      --primary: #0a56d6;
      --primary2: #2a89ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg1), var(--bg2));
    }

    .wrap {
      width: min(780px, 100%);
      border: 1px solid #e6edf7;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(2, 6, 23, 0.08);
      overflow: hidden;
    }

    .head {
      padding: 22px;
      color: #fff;
      background: linear-gradient(120deg, var(--primary), var(--primary2));
    }

    .head h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .head p {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.5;
      opacity: 0.96;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .back-btn {
      display: inline-block;
      width: fit-content;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      color: #0a4fc4;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 11px;
      margin-bottom: 6px;
    }

    .nav-btn {
      display: block;
      width: 100%;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      background: #fff;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: #b4ccf3;
      box-shadow: 0 8px 18px rgba(10, 86, 214, 0.12);
    }

    .nav-btn strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.02rem;
      color: #0a3f99;
    }

    .nav-btn span {
      color: var(--sub);
      font-size: 0.9rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="head">
      <h1>파견·사용업체 체크리스트</h1>
      <p>아래에서 점검 대상을 선택하세요.</p>
    </section>
    <section class="content">
      <a class="back-btn" href="index.html">메인으로 돌아가기</a>
      <a class="nav-btn" href="dispatch-violation-checklist.html">
        <strong>파견업체 위반사항 체크리스트</strong>
        <span>파견사업주 관점 위반 리스크 점검</span>
      </a>
      <a class="nav-btn" href="dispatch-user-company-checklist.html">
        <strong>사용업체 사업장 위반사항 체크리스트</strong>
        <span>사용업체 관점 직접고용·차별·안전보건 점검</span>
      </a>
    </section>
  </main>
</body>
</html>
